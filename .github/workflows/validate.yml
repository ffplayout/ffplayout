name: Validate
on: [push, pull_request]
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    env:
      CARGO_INCREMENTAL: 0
      CARGO_BUILD_JOBS: 1
      VCPKGRS_DYNAMIC: 1

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set Build Tools and update Rust
        run: |
          rustup update stable
          rustup component add rustfmt clippy

      - name: Set macOS Rust flags
        if: runner.os == 'macOS'
        run: echo 'RUSTFLAGS=-Csplit-debuginfo=packed' >> $GITHUB_ENV

      - name: Install FFmpeg libraries on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntuhandbook1/ffmpeg7
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libavcodec-dev \
            libavdevice-dev \
            libavfilter-dev \
            libavformat-dev \
            libavutil-dev \
            libswresample-dev \
            libswscale-dev \
            pkg-config
          ffmpeg -version
          test "$(pkg-config --modversion libavformat | cut -d. -f1)" -ge 61

      - name: Install FFmpeg libraries on macOS
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ffmpeg pkg-config

      - name: Install FFmpeg libraries on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install ffmpeg:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          echo "VCPKGRS_DYNAMIC=1" >> $env:GITHUB_ENV

      - name: Frontend checks
        if: runner.os == 'Linux'
        run: |
          npm ci
          npm run type-check
          npm run build

      - name: Rust tests and lint on Linux
        if: runner.os == 'Linux'
        run: |
          cargo test --no-default-features
          cargo clippy --no-default-features --all-targets -- --deny warnings
          cargo fmt --all -- --check
          cargo build --no-default-features --features embed_frontend

      - name: Rust build on macOS
        if: runner.os == 'macOS'
        run: cargo build --no-default-features --features embed_frontend

      - name: Rust build on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo build --release --no-default-features --features embed_frontend
